name: Build Daily Market Insight

on:
  push:
    paths:
      - "briefs/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Homepage
        run: python scripts/generate_index.py

      - name: Generate Archive
        run: python scripts/generate_archive.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add index.html archive.html

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "🤖 Auto update homepage & archive"
            git push
          fi
